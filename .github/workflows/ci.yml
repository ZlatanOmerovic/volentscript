name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build + test (macOS arm64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Pin check — LLVM major must be 22
        run: |
          MAJOR=$("$(brew --prefix llvm)/bin/llvm-config" --version | cut -d. -f1)
          echo "brew LLVM major: $MAJOR"
          test "$MAJOR" = "22" || {
            echo "::error::brew LLVM is $MAJOR, the workspace pins 22 (inkwell llvm22-1 / LLVM_SYS_221_PREFIX — see README toolchain table)"; exit 1; }

      - name: Rust toolchain (MSRV)
        run: rustup toolchain install 1.85 --profile minimal --component rustfmt,clippy && rustup default 1.85

      - name: Export LLVM prefix
        run: echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Tests (unit + golden corpus + examples)
        run: cargo test --workspace

  cross-runtime:
    name: runtime cross-compiles (Linux targets)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain + Linux targets
        run: |
          rustup toolchain install 1.85 --profile minimal && rustup default 1.85
          rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
      - name: Cross-build the runtime staticlib
        run: |
          cargo build -p runtime --target x86_64-unknown-linux-gnu --release
          cargo build -p runtime --target aarch64-unknown-linux-gnu --release
