name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build + test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            label: macOS arm64
          - os: ubuntu-24.04
            label: Linux x86-64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y libpolly-22-dev libzstd-dev zlib1g-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Pin check — LLVM major must be 22
        run: |
          MAJOR=$("$LLVM_SYS_221_PREFIX/bin/llvm-config" --version | cut -d. -f1)
          echo "LLVM major: $MAJOR"
          test "$MAJOR" = "22" || {
            echo "::error::LLVM is $MAJOR, the workspace pins 22 (inkwell llvm22-1 / LLVM_SYS_221_PREFIX — see README toolchain table)"; exit 1; }

      # Build/test on the MSRV; lint on stable (clippy's lint set moves
      # between versions — stable matches development machines).
      - name: Rust toolchains
        run: |
          rustup toolchain install 1.88 --profile minimal
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default 1.88

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Format
        run: cargo +stable fmt --all -- --check

      - name: Clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Tests (unit + golden corpus + examples)
        run: cargo test --workspace

  cross-runtime:
    name: runtime cross-compiles (Linux targets from macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain + Linux targets
        run: |
          rustup toolchain install 1.88 --profile minimal && rustup default 1.88
          rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
      - name: Cross-build the runtime staticlib
        run: |
          cargo build -p runtime --target x86_64-unknown-linux-gnu --release
          cargo build -p runtime --target aarch64-unknown-linux-gnu --release
