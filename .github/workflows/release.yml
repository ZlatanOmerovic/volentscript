name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: package + publish (macOS arm64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Pin check — LLVM major must be 22
        run: |
          MAJOR=$("$(brew --prefix llvm)/bin/llvm-config" --version | cut -d. -f1)
          test "$MAJOR" = "22" || { echo "::error::brew LLVM is $MAJOR, need 22"; exit 1; }

      - name: Rust toolchain
        run: rustup toolchain install 1.85 --profile minimal && rustup default 1.85

      - name: Export LLVM prefix
        run: echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --workspace --release

      - name: Smoke test the artifact
        run: |
          printf 'trace("release smoke");\n' > /tmp/smoke.vlt
          ./target/release/volentscript run /tmp/smoke.vlt | grep -q "release smoke"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="volentscript-${VERSION}-macos-arm64"
          mkdir -p "dist/$PKG"
          cp target/release/volentscript "dist/$PKG/"
          cp target/release/libruntime.a "dist/$PKG/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/$PKG/"
          cp -R examples "dist/$PKG/examples"
          rm -rf "dist/$PKG/examples/httpd/public" && mkdir -p "dist/$PKG/examples/httpd/public"
          cp examples/httpd/public/index.html "dist/$PKG/examples/httpd/public/"
          tar -czf "dist/$PKG.tar.gz" -C dist "$PKG"
          shasum -a 256 "dist/$PKG.tar.gz" > "dist/$PKG.tar.gz.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
