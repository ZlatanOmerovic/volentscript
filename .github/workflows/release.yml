name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: package
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            triple: macos-arm64
          - os: ubuntu-24.04
            triple: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y libpolly-22-dev libzstd-dev zlib1g-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Pin check — LLVM major must be 22
        run: |
          MAJOR=$("$LLVM_SYS_221_PREFIX/bin/llvm-config" --version | cut -d. -f1)
          test "$MAJOR" = "22" || { echo "::error::LLVM is $MAJOR, need 22"; exit 1; }

      - name: Rust toolchain + cross targets
        run: |
          rustup toolchain install 1.88 --profile minimal && rustup default 1.88
          rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu

      - name: mingw (dlltool for the windows-gnu runtime)
        if: runner.os == 'macOS'
        run: brew install mingw-w64

      - name: mingw (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mingw-w64

      - name: Build release
        run: cargo build --workspace --release

      - name: Build cross-target runtimes
        run: |
          cargo build -p runtime --target x86_64-unknown-linux-gnu --release
          cargo build -p runtime --target aarch64-unknown-linux-gnu --release
          cargo build -p runtime --target x86_64-pc-windows-gnu --release

      - name: Smoke test the artifact
        run: |
          printf 'trace("release smoke");\n' > /tmp/smoke.vlt
          ./target/release/volentscript run /tmp/smoke.vlt | grep -q "release smoke"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="volentscript-${VERSION}-${{ matrix.triple }}"
          mkdir -p "dist/$PKG"
          cp target/release/volentscript "dist/$PKG/"
          cp target/release/libruntime.a "dist/$PKG/"
          # Cross-target runtimes: --target works out of the box with
          # --runtime-lib runtime/<triple>/libruntime.a
          for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            mkdir -p "dist/$PKG/runtime/$triple"
            cp "target/$triple/release/libruntime.a" "dist/$PKG/runtime/$triple/"
          done
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/$PKG/"
          cp -R examples "dist/$PKG/examples"
          tar -czf "dist/$PKG.tar.gz" -C dist "$PKG"
          shasum -a 256 "dist/$PKG.tar.gz" > "dist/$PKG.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.triple }}
          path: dist/*.tar.gz*

  publish:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
